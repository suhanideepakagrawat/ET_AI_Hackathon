<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VayuMitra · Citizen Air-Quality Assistant</title>
<style>
  :root{
    --teal:#075E54; --teal2:#128C7E; --accent:#25D366;
    --bg:#e9e2db; --in:#ffffff; --out:#d6f5c6; --ink:#0b141a; --muted:#63727a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:#0b141a;color:var(--ink)}
  .app{max-width:470px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;
       background:var(--bg);position:relative;box-shadow:0 0 48px rgba(0,0,0,.55);overflow:hidden}

  header{background:var(--teal);color:#fff;padding:9px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);
          display:grid;place-items:center;font-size:23px;flex-shrink:0}
  .htext{flex:1;min-width:0}.htext b{font-size:16px;display:block;line-height:1.1}
  .htext span{font-size:11.5px;opacity:.85;display:flex;align-items:center;gap:4px}
  .dot{width:7px;height:7px;border-radius:50%;background:#5efc82;display:inline-block}
  .hbtn{background:rgba(255,255,255,.16);border:0;color:#fff;border-radius:18px;padding:6px 9px;
        font-size:12.5px;font-weight:600;cursor:pointer;display:flex;gap:5px;align-items:center}
  .hbtn.spk.on{background:var(--accent);color:#04241a}
  .langtog{display:flex;background:rgba(255,255,255,.16);border-radius:18px;overflow:hidden;font-size:12px;font-weight:700}
  .langtog button{background:none;border:0;color:#fff;padding:6px 10px;cursor:pointer}
  .langtog button.on{background:#fff;color:var(--teal)}

  .tabs{display:flex;background:var(--teal2);flex-shrink:0}
  .tabs button{flex:1;background:none;border:0;color:rgba(255,255,255,.72);padding:10px;font-size:13px;
    font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{color:#fff;border-bottom-color:var(--accent)}

  .chat{flex:1;overflow-y:auto;padding:14px 10px 6px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
  .row{display:flex;gap:7px;align-items:flex-end;max-width:100%}
  .row.out{justify-content:flex-end}
  .bubav{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);
         display:grid;place-items:center;font-size:14px;flex-shrink:0;margin-bottom:2px}
  .msg{max-width:80%;padding:9px 11px;border-radius:11px;font-size:14px;line-height:1.45;
    box-shadow:0 1px 1px rgba(0,0,0,.13);white-space:pre-wrap;word-wrap:break-word;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.in{background:var(--in);border-top-left-radius:3px}
  .msg.out{background:var(--out);border-top-right-radius:3px}
  .msg .time{font-size:10px;color:var(--muted);float:right;margin:5px -2px -3px 8px}
  .msg .spk{cursor:pointer;font-size:13px;opacity:.55;margin-left:7px}
  .msg b.h{display:block;margin-bottom:3px}
  .feat{margin:5px 0 0;padding:0;list-style:none;font-size:13.5px}
  .feat li{padding:2px 0;display:flex;gap:7px}
  .typing{display:flex;gap:4px;padding:11px 13px;background:#fff;border-radius:11px;width:52px;box-shadow:0 1px 1px rgba(0,0,0,.13)}
  .typing i{width:7px;height:7px;background:#b9c4c9;border-radius:50%;animation:bl 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}

  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 4px 4px 35px}
  .chip{background:#fff;border:1.4px solid var(--teal2);color:var(--teal2);border-radius:17px;
    padding:7px 12px;font-size:12.7px;cursor:pointer;font-weight:600;display:flex;gap:5px;align-items:center;
    transition:.12s;white-space:nowrap}
  .chip:hover{background:var(--teal2);color:#fff}
  .chip .b{font-size:10px;color:#fff;border-radius:9px;padding:1px 6px}

  /* AQI card */
  .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.18);
    border-left:6px solid var(--muted);max-width:88%;animation:pop .2s ease}
  .card .top{display:flex;align-items:center;gap:10px;padding:11px 12px 8px}
  .aqiball{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;color:#fff;flex-shrink:0}
  .aqiball b{font-size:20px}.aqiball small{font-size:8px;opacity:.9}
  .card .meta{flex:1;min-width:0}.card .meta b{font-size:15px}
  .card .meta .l2{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;font-size:11px;font-weight:700}
  .card .body{padding:2px 12px 9px;font-size:13.6px;line-height:1.5}
  .acts{display:flex;flex-wrap:wrap;gap:5px;padding:0 12px 9px}
  .act{font-size:11.5px;background:#eef6f3;color:#0a5a4a;border-radius:6px;padding:3px 8px;font-weight:600}
  .act.warn{background:#fdecec;color:#b3261e}
  .src{margin:0 12px 12px;font-size:11.3px}
  .src .head{color:var(--teal2);cursor:pointer;font-weight:700;display:flex;gap:5px;align-items:center}
  .src .list{margin-top:6px;display:none;border-left:2px solid #dbe6f0;padding-left:9px}
  .src.open .list{display:block}
  .src .list a{display:block;color:#2b4a86;text-decoration:none;padding:3px 0;border-bottom:1px dashed #e5e5e5}
  .src .list a small{color:var(--muted);display:block;font-weight:400}

  /* voice bar + input */
  .voicebar{display:none;align-items:center;gap:8px;background:#04352a;color:#fff;padding:7px 12px;font-size:12.5px;flex-shrink:0}
  .voicebar.on{display:flex}
  .voicebar .eq{display:flex;gap:2px;align-items:flex-end;height:14px}
  .voicebar .eq i{width:3px;background:var(--accent);animation:eq .8s infinite}
  .voicebar .eq i:nth-child(2){animation-delay:.2s}.voicebar .eq i:nth-child(3){animation-delay:.4s}.voicebar .eq i:nth-child(4){animation-delay:.1s}
  @keyframes eq{0%,100%{height:4px}50%{height:14px}}
  .voicebar.paused .eq i{animation-play-state:paused}
  .vbtn{margin-left:auto;background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:14px;padding:5px 11px;cursor:pointer;font-size:12.5px}
  .inputbar{display:flex;gap:7px;padding:8px;background:#f0f0f0;flex-shrink:0;align-items:center}
  .inputbar input{flex:1;padding:11px 15px;border:0;border-radius:22px;font-size:14px;outline:none;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .iconbtn{width:45px;height:45px;border-radius:50%;border:0;background:var(--teal);color:#fff;font-size:18px;
    cursor:pointer;flex-shrink:0;display:grid;place-items:center}
  .iconbtn.rec{background:#e0245e;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}

  .compare{flex:1;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:14px;background:#f5f6f8}
  .compare.on{display:flex}.chatwrap.off{display:none}
  .ccard{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .ccard h3{margin:0 0 2px;font-size:17px;display:flex;justify-content:space-between;align-items:center}
  .ccard .sub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .bar{height:26px;border-radius:6px;display:flex;overflow:hidden;font-size:10px;color:#fff}
  .bar span{display:grid;place-items:center;min-width:0}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-top:1px solid #f0f0f0}
  .interv{margin-top:10px;background:#eefaf3;border-radius:8px;padding:10px;font-size:12.5px}
  .interv b{color:#0a7a4a}
  .cnote{font-size:11px;color:var(--muted);text-align:center;padding:2px 14px 14px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">🌬️</div>
    <div class="htext"><b>VayuMitra</b><span><i class="dot"></i> Air-quality assistant · online</span></div>
    <button class="hbtn spk" id="spkBtn" onclick="toggleAutoplay()" title="Auto-speak replies">🔊</button>
    <div class="langtog">
      <button id="lang-en" class="on" onclick="setLang('en')">EN</button>
      <button id="lang-hi" onclick="setLang('hi')">हिं</button>
    </div>
  </header>

  <div class="tabs">
    <button id="tab-chat" class="on" onclick="showTab('chat')">💬 Assistant</button>
    <button id="tab-compare" onclick="showTab('compare')">🏙️ Compare Cities</button>
  </div>

  <div class="chatwrap" id="chatwrap" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="chat" id="chat"></div>

    <div class="voicebar" id="voicebar">
      <div class="eq"><i></i><i></i><i></i><i></i></div>
      <span id="voiceLabel">Speaking…</span>
      <button class="vbtn" id="pauseBtn" onclick="pauseResume()">⏸ Pause</button>
      <button class="vbtn" onclick="stopSpeak()">⏹ Stop</button>
    </div>

    <div class="inputbar">
      <input id="msg" placeholder="Type or tap the mic…" onkeydown="if(event.key==='Enter')onSend()" autocomplete="off" />
      <button class="iconbtn" id="micBtn" onclick="toggleMic()" title="Speak">🎤</button>
      <button class="iconbtn" onclick="onSend()" title="Send">➤</button>
    </div>
  </div>

  <div class="compare" id="compare"></div>
</div>

<script>
const API=(location.protocol==='file:')?'http://localhost:8000':'';
let LANG='en',CITY='delhi',WARD=null,PERSONA=null,META=null,WARDS=[],HISTORY=[];
let convState='boot',autoplay=false;

const TXT={
  en:{ph:'Type or tap the mic…',
    greet:"Namaste! 🙏 I'm **VayuMitra**, your personal air-quality assistant.",
    canDo:"Here's how I can help:",
    askArea:"📍 First — which area are you in? Tap one below, or just type your area name.",
    otherArea:"🔍 Other area",
    askPersona:name=>`Got it — **${name}**. 👤 And who is this advice for?`,
    changedArea:name=>`📍 Switched to **${name}**.`,
    askPersonaFirst:"👤 Who is this advice for? Tap one, or tell me (e.g. \"for my child\").",
    ready:"Ask me anything, or tap a suggestion 👇",
    followups:['📅 Tomorrow?','😷 Wear a mask?','🏃 Safe to exercise?','📍 Change area','👤 Change person','📖 Sources'],
    srcHead:"📖 The authentic sources I base advice on:",
    reask:"I didn't catch that area — please tap one below 👇"},
  hi:{ph:'टाइप करें या माइक दबाएँ…',
    greet:"नमस्ते! 🙏 मैं **वायुमित्र** हूँ, आपका निजी वायु-गुणवत्ता सहायक।",
    canDo:"मैं इस तरह मदद कर सकता हूँ:",
    askArea:"📍 सबसे पहले — आप किस क्षेत्र में हैं? नीचे से चुनें या अपना क्षेत्र टाइप करें।",
    otherArea:"🔍 अन्य क्षेत्र",
    askPersona:name=>`ठीक है — **${name}**। 👤 यह सलाह किसके लिए है?`,
    changedArea:name=>`📍 **${name}** पर बदल दिया।`,
    askPersonaFirst:"👤 यह सलाह किसके लिए है? चुनें या बताएँ (जैसे \"मेरे बच्चे के लिए\")।",
    ready:"कुछ भी पूछें, या नीचे सुझाव दबाएँ 👇",
    followups:['📅 कल?','😷 मास्क?','🏃 व्यायाम ठीक?','📍 क्षेत्र बदलें','👤 व्यक्ति बदलें','📖 स्रोत'],
    srcHead:"📖 जिन प्रामाणिक स्रोतों पर सलाह आधारित है:",
    reask:"वह क्षेत्र समझ नहीं आया — कृपया नीचे से चुनें 👇"},
};
const BANDCOLOR={good:'#009966',satisfactory:'#84cf33',moderate:'#c9a800',poor:'#ff8c1a',very_poor:'#cc0033',severe:'#7e0023'};
const PKEYS={child:['child','kid','bachcha','बच्च','school','beta'],elderly:['elder','old','senior','budhe','बुज़ुर्ग','बूढ़'],
  respiratory:['asthma','अस्थमा','दमा','saans','साँस','heart','lung','copd'],outdoor_worker:['worker','मज़दूर','labour','labor','delivery','vendor'],
  pregnant:['pregnan','गर्भ']};

function now(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function md(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}
const chat=()=>document.getElementById('chat');
function scroll(){chat().scrollTop=chat().scrollHeight;}

/* ---------- rendering ---------- */
function addUser(text){
  const r=document.createElement('div');r.className='row out';
  r.innerHTML=`<div class="msg out">${esc(text)}<span class="time">${now()}</span></div>`;
  chat().appendChild(r);scroll();
}
function addBot(html,{chips,speakText,raw}={}){
  const r=document.createElement('div');r.className='row';
  const spk=speakText?`<span class="spk" onclick="speak(this.parentElement.dataset.s)">🔊</span>`:'';
  const inner=raw?html:`<div class="msg in" data-s="${speakText?esc(speakText):''}">${html}${spk}<span class="time">${now()}</span></div>`;
  r.innerHTML=`<div class="bubav">🌬️</div>${inner}`;
  chat().appendChild(r);
  if(chips&&chips.length){
    const c=document.createElement('div');c.className='chips';
    chips.forEach(ch=>{const b=document.createElement('button');b.className='chip';b.innerHTML=ch.html||esc(ch.label);
      b.onclick=()=>ch.act();c.appendChild(b);});
    chat().appendChild(c);
  }
  scroll();
  if(speakText&&autoplay)speak(speakText);
}
let typingEl=null;
function typing(on){
  if(on&&!typingEl){typingEl=document.createElement('div');typingEl.className='row';
    typingEl.innerHTML=`<div class="bubav">🌬️</div><div class="typing"><i></i><i></i><i></i></div>`;
    chat().appendChild(typingEl);scroll();}
  else if(!on&&typingEl){typingEl.remove();typingEl=null;}
}

/* ---------- boot + flow ---------- */
async function boot(){
  try{ META=await(await fetch(API+'/meta')).json(); }
  catch(e){ addBot('⚠️ Cannot reach the assistant API. Start it:<br><code>uvicorn backend.advisory_api:app --port 8000</code>'); return; }
  CITY=META.active_city||'delhi';
  await loadWards();
  greet();
}
async function loadWards(){
  const d=await(await fetch(API+`/wards?city=${CITY}`)).json();
  WARDS=d.wards||[];
}
function greet(){
  const t=TXT[LANG];
  const feats=(META.features||[]).map(f=>`<li>${f.icon} <span>${esc(LANG==='hi'?f.hi:f.en)}</span></li>`).join('');
  addBot(`<div class="msg in"><b class="h">${md(t.greet)}</b>${t.canDo}<ul class="feat">${feats}</ul><span class="time">${now()}</span></div>`,{raw:true});
  askArea();
}
function areaChips(){
  const t=TXT[LANG];
  const top=WARDS.slice(0,6).map(w=>({html:`${esc(w.name)} <span class="b" style="background:${w.color}">${w.aqi}</span>`,
    act:()=>pickArea(w)}));
  top.push({label:t.otherArea,act:()=>{document.getElementById('msg').focus();}});
  return top;
}
function askArea(){convState='ask_area';addBot(`<div class="msg in">${md(TXT[LANG].askArea)}<span class="time">${now()}</span></div>`,{raw:true});
  const c=document.createElement('div');c.className='chips';
  areaChips().forEach(ch=>{const b=document.createElement('button');b.className='chip';b.innerHTML=ch.html||esc(ch.label);b.onclick=()=>ch.act();c.appendChild(b);});
  chat().appendChild(c);scroll();}
function personaChips(){
  return (META.personas||[]).map(p=>({html:`${p.icon} ${esc(LANG==='hi'?p.label_hi:p.label_en)}`,act:()=>pickPersona(p.key)}));
}
function askPersona(prefix){
  convState='ask_persona';
  addBot(`<div class="msg in">${md(prefix||TXT[LANG].askPersonaFirst)}<span class="time">${now()}</span></div>`,{raw:true,chips:personaChips()});
}
function pickArea(w){
  WARD=w.zone_id;addUser(w.name);
  addBot(`<div class="msg in">${md(TXT[LANG].askPersona(w.name))}<span class="time">${now()}</span></div>`,{raw:true,chips:personaChips()});
  convState='ask_persona';
}
function pickPersona(key){
  PERSONA=key;const p=(META.personas||[]).find(x=>x.key===key);
  addUser(p?(LANG==='hi'?p.label_hi:p.label_en):key);
  convState='ready';showAdvisory();
}

/* ---------- advisory + sources ---------- */
async function showAdvisory(extraNote){
  if(!WARD){askArea();return;}
  typing(true);
  let a;try{a=await(await fetch(`${API}/advisory?zone=${encodeURIComponent(WARD)}&persona=${PERSONA||'general'}&horizon=24&lang=${LANG}`)).json();}
  catch(e){typing(false);addBot('⚠️ Could not fetch the advisory.');return;}
  typing(false);
  renderCard(a);
  addBot(`<div class="msg in">${md(TXT[LANG].ready)}<span class="time">${now()}</span></div>`,{raw:true,chips:followupChips()});
}
function renderCard(a){
  const g=a.guidance,col=BANDCOLOR[a.band.key]||'#888';
  const bl=LANG==='hi'?a.band.label_hi:a.band.label_en;
  const acts=[`<span class="act ${g.outdoor_ok?'':'warn'}">${g.outdoor_ok?'✅ Outdoor OK':'🚫 Avoid outdoors'}</span>`];
  if(g.mask)acts.push('<span class="act warn">😷 N95 mask</span>');
  if(g.windows_closed)acts.push('<span class="act warn">🪟 Windows closed</span>');
  if(g.meds_handy)acts.push('<span class="act warn">💊 Keep meds handy</span>');
  if(a.grap_stage)acts.push(`<span class="act warn">⚠️ GRAP ${a.grap_stage}</span>`);
  const srcs=(a.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${esc(s.title)}<small>${esc(s.publisher)} · ${s.year}</small></a>`).join('');
  const card=document.createElement('div');card.className='row';
  card.innerHTML=`<div class="bubav">🌬️</div><div class="card" style="border-left-color:${col}">
    <div class="top"><div class="aqiball" style="background:${col}"><div style="text-align:center"><b>${a.aqi}</b><br><small>AQI</small></div></div>
      <div class="meta"><b>${esc(a.zone_name)}</b>
        <div class="l2"><span class="badge" style="background:${col}">${bl}</span> · next ${a.horizon_hours}h · ${a.persona.icon} ${esc(LANG==='hi'?a.persona.label_hi:a.persona.label_en)}</div>
        <div class="l2">🏭 ${esc(a.dominant_source||'')} ${a.dominant_source_pct?'('+a.dominant_source_pct+'%)':''} · 🎯 ${Math.round((a.confidence||0)*100)}% confidence</div>
      </div></div>
    <div class="body" data-s="${esc(a.message)}">${esc(a.message)} <span class="spk" onclick="speak(this.parentElement.dataset.s)">🔊</span></div>
    <div class="acts">${acts.join('')}</div>
    <div class="src" onclick="this.classList.toggle('open')"><div class="head">📖 ${esc(a.provenance)} <span style="opacity:.6">▾ tap for sources</span></div><div class="list">${srcs}</div></div>
  </div>`;
  chat().appendChild(card);scroll();
  if(autoplay)speak(a.message);
}
function followupChips(){
  const f=TXT[LANG].followups;
  return [
    {label:f[0],act:()=>quickSend(f[0])},{label:f[1],act:()=>quickSend(f[1])},{label:f[2],act:()=>quickSend(f[2])},
    {label:f[3],act:()=>askArea()},{label:f[4],act:()=>askPersona(TXT[LANG].askPersonaFirst)},{label:f[5],act:()=>showSources()},
  ];
}
async function showSources(){
  let d;try{d=await(await fetch(API+'/sources')).json();}catch(e){return;}
  const list=d.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${esc(s.title)}<small>${esc(s.publisher)} · ${s.year} — ${esc(s.grounds)}</small></a>`).join('');
  addBot(`<div class="msg in"><b class="h">${esc(TXT[LANG].srcHead)}</b><div class="src open"><div class="list">${list}</div></div><span class="time">${now()}</span></div>`,{raw:true});
}

/* ---------- input handling ---------- */
function quickSend(t){document.getElementById('msg').value=t;onSend();}
function onSend(){
  const inp=document.getElementById('msg');const text=inp.value.trim();if(!text)return;
  inp.value='';handleText(text);
}
function resolveArea(text){
  const low=text.toLowerCase();
  return WARDS.find(w=>low.includes(w.name.toLowerCase()))||
    WARDS.find(w=>w.name.toLowerCase().replace('/',' ').split(' ').some(tok=>tok.length>4&&low.includes(tok)));
}
function resolvePersona(text){
  const low=text.toLowerCase();
  for(const[k,kws]of Object.entries(PKEYS))if(kws.some(w=>low.includes(w)))return k;
  return null;
}
function localIntent(low){
  if(/\b(menu|options|मेन्यू)\b/.test(low))return 'menu';
  if(/(change|switch|different|another|बदल).*(area|zone|place|क्षेत्र|जगह)|(area|क्षेत्र).*(change|बदल)/.test(low))return 'area';
  if(/(change|different|बदल).*(person|persona|someone|व्यक्ति)|for (my|a) /.test(low))return 'person';
  if(/(source|reference|proof|कहाँ से|कहां से|स्रोत|प्रमाण)/.test(low))return 'sources';
  if(/(what can you|features|help|kya kar|क्या कर|सुविध|मदद)/.test(low))return 'features';
  if(/(compare|other cit|dusre|दूसरे शहर|तुलना)/.test(low))return 'compare';
  return null;
}
async function handleText(text){
  addUser(text);
  const low=text.toLowerCase();
  const intent=localIntent(low);
  if(intent==='area'){askArea();return;}
  if(intent==='person'){askPersona(TXT[LANG].askPersonaFirst);return;}
  if(intent==='sources'){showSources();return;}
  if(intent==='features'){greetFeaturesOnly();return;}
  if(intent==='compare'){showTab('compare');return;}
  if(intent==='menu'){askArea();return;}

  // Onboarding states
  if(convState==='ask_area'){
    const w=resolveArea(text);
    if(w){pickArea(w);}else{addBot(`<div class="msg in">${esc(TXT[LANG].reask)}<span class="time">${now()}</span></div>`,{raw:true});askArea();}
    return;
  }
  if(convState==='ask_persona'){
    const pk=resolvePersona(text);PERSONA=pk||'general';
    const p=(META.personas||[]).find(x=>x.key===PERSONA);
    convState='ready';showAdvisory();return;
  }
  // Ready: also allow area/persona switches inside a question
  const w=resolveArea(text);if(w)WARD=w.zone_id;
  const pk=resolvePersona(text);if(pk)PERSONA=pk;
  if(!WARD){askArea();return;}
  sendChat(text);
}
async function sendChat(text){
  typing(true);
  try{
    const r=await(await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({zone:WARD,message:text,persona:PERSONA,lang:LANG,horizon:'24',history:HISTORY.slice(-6),city:CITY})})).json();
    typing(false);
    if(r.zone_switched){WARD=r.zone_id;addBot(`<div class="msg in">${md(TXT[LANG].changedArea(r.zone_name))}<span class="time">${now()}</span></div>`,{raw:true});}
    const srcTag=r.provenance?`<div class="src" onclick="this.classList.toggle('open')"><div class="head">📖 ${esc(r.provenance)} <span style="opacity:.6">▾</span></div><div class="list">${(r.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${esc(s.title)}<small>${esc(s.publisher)} · ${s.year}</small></a>`).join('')}</div></div>`:'';
    const r2=document.createElement('div');r2.className='row';
    r2.innerHTML=`<div class="bubav">🌬️</div><div class="msg in" data-s="${esc(r.reply)}">${esc(r.reply)}<span class="spk" onclick="speak(this.parentElement.dataset.s)">🔊</span>${srcTag}<span class="time">${now()}</span></div>`;
    chat().appendChild(r2);scroll();
    HISTORY.push({role:'user',content:text},{role:'assistant',content:r.reply_en||r.reply});
    if(autoplay)speak(r.reply);
    // follow-up chips
    const c=document.createElement('div');c.className='chips';
    followupChips().forEach(ch=>{const b=document.createElement('button');b.className='chip';b.textContent=ch.label;b.onclick=()=>ch.act();c.appendChild(b);});
    chat().appendChild(c);scroll();
  }catch(e){typing(false);addBot('⚠️ Something went wrong. Please try again.');}
}
function greetFeaturesOnly(){
  const feats=(META.features||[]).map(f=>`<li>${f.icon} <span>${esc(LANG==='hi'?f.hi:f.en)}</span></li>`).join('');
  addBot(`<div class="msg in"><b class="h">${esc(TXT[LANG].canDo)}</b><ul class="feat">${feats}</ul><span class="time">${now()}</span></div>`,{raw:true,chips:followupChips()});
}

/* ---------- voice ---------- */
/* Prefers the server's neural voice (ElevenLabs EN+HI / Deepgram EN); if that's
   unavailable it uses the browser's built-in voice. Pause/resume/stop work for both. */
let voices=[],speaking=false,paused=false,voiceMode='synth',currentAudio=null;
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(lang){
  const pref=lang==='hi'?'hi':'en';
  const score=v=>{let s=0;const n=v.name.toLowerCase();
    if(v.lang.toLowerCase().startsWith(pref))s+=10;
    if(/natural|neural|online/.test(n))s+=6;   // Edge neural voices sound best
    if(/google/.test(n))s+=3;
    if(pref==='hi'&&/swara|hemant|madhur|हि/.test(n))s+=4;
    if(pref==='en'&&/india|ravi|neerja|aria|jenny/.test(n))s+=2;
    return s;};
  return voices.slice().sort((a,b)=>score(b)-score(a))[0];
}
function ttsUrl(text){return `${API}/tts?lang=${LANG}&text=${encodeURIComponent(text.slice(0,800))}`;}
function warmTts(text){
  // Fire-and-forget: warms the server+browser cache so "Listen" is instant.
  if(META&&META.voice_available&&LANG==='en'&&text)fetch(ttsUrl(text)).catch(()=>{});
}
function speak(text){
  if(!text)return;stopSpeak();
  if(META&&META.voice_available){        // server neural voice (streams; plays on first bytes)
    voiceMode='audio';showVoiceBar(true,'load');
    const a=new Audio(ttsUrl(text));a.preload='auto';currentAudio=a;
    let started=false;
    // Never hang on "loading": if audio hasn't started in 6s, use the browser voice.
    const bail=setTimeout(()=>{if(!started&&currentAudio===a){a.src='';currentAudio=null;browserSpeak(text);}},6000);
    a.onplaying=()=>{started=true;clearTimeout(bail);speaking=true;paused=false;showVoiceBar(true,'speak');};
    a.onended=()=>{clearTimeout(bail);speaking=false;if(currentAudio===a)currentAudio=null;showVoiceBar(false);};
    a.onerror=()=>{clearTimeout(bail);if(currentAudio===a){currentAudio=null;browserSpeak(text);}};  // 204 / fail -> browser
    a.play().catch(()=>{clearTimeout(bail);if(currentAudio===a){currentAudio=null;browserSpeak(text);}});
  }else{ browserSpeak(text); }
}
function browserSpeak(text){
  if(!window.speechSynthesis)return;
  voiceMode='synth';speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(LANG);if(v){u.voice=v;u.lang=v.lang;}else{u.lang=LANG==='hi'?'hi-IN':'en-IN';}
  u.rate=0.97;u.pitch=1.06;   // slightly slower + warmer to avoid the monotone default
  u.onstart=()=>{speaking=true;paused=false;showVoiceBar(true,'speak');};
  u.onend=()=>{speaking=false;showVoiceBar(false);};
  u.onerror=()=>{speaking=false;showVoiceBar(false);};
  speechSynthesis.speak(u);
}
function showVoiceBar(on,state){const b=document.getElementById('voicebar');b.classList.toggle('on',on);
  if(on){const L=document.getElementById('voiceLabel');
    L.textContent=state==='load'?(LANG==='hi'?'आवाज़ लोड हो रही…':'Loading voice…'):(LANG==='hi'?'बोल रहा हूँ…':'Speaking…');
    b.classList.remove('paused');document.getElementById('pauseBtn').textContent='⏸ Pause';}}
function setPaused(p){paused=p;const bar=document.getElementById('voicebar');bar.classList.toggle('paused',p);
  document.getElementById('pauseBtn').textContent=p?'▶ Resume':'⏸ Pause';
  document.getElementById('voiceLabel').textContent=p?(LANG==='hi'?'रुका हुआ':'Paused'):(LANG==='hi'?'बोल रहा हूँ…':'Speaking…');}
function pauseResume(){
  if(voiceMode==='audio'&&currentAudio){
    if(currentAudio.paused){currentAudio.play();setPaused(false);}else{currentAudio.pause();setPaused(true);}
  }else if(window.speechSynthesis){
    if(paused){speechSynthesis.resume();setPaused(false);}else{speechSynthesis.pause();setPaused(true);}
  }}
function stopSpeak(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(window.speechSynthesis)speechSynthesis.cancel();
  speaking=false;paused=false;showVoiceBar(false);}
function toggleAutoplay(){autoplay=!autoplay;document.getElementById('spkBtn').classList.toggle('on',autoplay);
  if(!autoplay)stopSpeak();}

let recog=null,recognizing=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addBot('🎤 Voice input works in Chrome/Edge. You can still type.');return;}
  if(recognizing){recog.stop();return;}
  recog=new SR();recog.lang=LANG==='hi'?'hi-IN':'en-IN';recog.interimResults=false;
  recog.onstart=()=>{recognizing=true;document.getElementById('micBtn').classList.add('rec');};
  recog.onend=()=>{recognizing=false;document.getElementById('micBtn').classList.remove('rec');};
  recog.onresult=e=>{const t=e.results[0][0].transcript;if(!autoplay){autoplay=true;document.getElementById('spkBtn').classList.add('on');}handleText(t);};
  recog.start();
}

/* ---------- language + tabs ---------- */
function setLang(l){LANG=l;
  document.getElementById('lang-en').classList.toggle('on',l==='en');
  document.getElementById('lang-hi').classList.toggle('on',l==='hi');
  document.getElementById('msg').placeholder=TXT[l].ph;
  addBot(`<div class="msg in">${esc(l==='hi'?'अब मैं हिन्दी में बात करूँगा। 🙏':'I\'ll continue in English. 🙂')}<span class="time">${now()}</span></div>`,{raw:true});
  if(convState==='ready'&&WARD)showAdvisory();
}
function showTab(t){
  document.getElementById('tab-chat').classList.toggle('on',t==='chat');
  document.getElementById('tab-compare').classList.toggle('on',t==='compare');
  document.getElementById('chatwrap').classList.toggle('off',t!=='chat');
  document.getElementById('compare').classList.toggle('on',t==='compare');
  if(t==='compare')renderCompare();
}
async function renderCompare(){
  const box=document.getElementById('compare');box.innerHTML='<div class="cnote">Loading…</div>';
  let d;try{d=await(await fetch(API+'/compare')).json();}catch(e){box.innerHTML='<div class="cnote">⚠️ API unreachable.</div>';return;}
  box.innerHTML='';
  d.cities.forEach(c=>{
    const bars=Object.entries(c.band_distribution||{}).map(([k,v])=>`<span style="flex:${v};background:${BANDCOLOR[k]||'#888'}">${v}</span>`).join('');
    const mix=c.source_mix||{},iv=c.intervention;
    const el=document.createElement('div');el.className='ccard';
    el.innerHTML=`<h3>${esc(c.name)} <span class="badge" style="background:${c.avg_aqi>200?'#cc0033':c.avg_aqi>100?'#c9a800':'#009966'}">avg ${c.avg_aqi}</span></h3>
      <div class="sub">${c.zones} zones · worst: ${esc(c.worst_zone.name)} (AQI ${c.worst_zone.aqi}) · ${c.data_kind} data</div>
      <div style="font-size:11px;color:#63727a;margin-bottom:3px">Zones by CPCB band</div><div class="bar">${bars}</div>
      <div class="kv"><span>🚗 Traffic</span><b>${mix.traffic||0}%</b></div>
      <div class="kv"><span>🏭 Industry</span><b>${mix.industry||0}%</b></div>
      <div class="kv"><span>🏗️ Construction/Dust</span><b>${mix.construction||0}%</b></div>
      <div class="interv">🎯 <b>Modelled intervention:</b> avg AQI ${iv.avg_aqi_before} → <b>${iv.avg_aqi_after}</b> (−${iv.reduction_pct}%) if the top source is tackled.
        <div style="font-size:10.5px;color:#63727a;margin-top:4px">${esc(iv.note)}</div></div>`;
    box.appendChild(el);
  });
  const n=document.createElement('div');n.className='cnote';n.textContent=d.note;box.appendChild(n);
}

boot();
